name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile contracts
        run: bun run hardhat compile

      - name: Run tests
        run: bun run hardhat test

      - name: Run solhint
        run: bunx solhint 'contracts/**/*.sol' --config .solhint.json

      - name: Check formatting
        run: bun run prettify:check